apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/baona1109/gitops-observability
    targetRevision: main
    path: clusters/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
