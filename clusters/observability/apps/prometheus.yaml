apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: observability-root:argoproj.io/Application:argocd/prometheus
    argocd.argoproj.io/sync-wave: "0"
  name: prometheus
  namespace: argocd
spec:
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kube-prometheus-stack
    helm:
      values: |
        grafana:
          adminPassword: admin

        prometheus:
          prometheusSpec:
            retention: 7d
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.0.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

