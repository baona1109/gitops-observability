apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: observability-root:argoproj.io/Application:argocd/jaeger
  name: jaeger
  namespace: argocd
spec:
  project: default
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  source:
    chart: jaeger
    helm:
      parameters:
        - name: storage.type
          value: memory
    repoURL: https://jaegertracing.github.io/helm-charts
    targetRevision: 0.71.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

