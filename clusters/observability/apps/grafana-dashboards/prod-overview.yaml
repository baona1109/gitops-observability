apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-prod-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  prod-overview.json: |
    {
      "title": "PROD Overview",
      "uid": "prod-overview",
      "tags": ["prod", "overview"],
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": {
              "query": "label_values(up, cluster)",
              "refId": "StandardVariableQuery"
            },
            "current": { "value": "prod", "text": "prod" },
            "refresh": 2,
            "sort": 1,
            "hide": 0
          },
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": {
              "query": "label_values(node_uname_info{cluster=\"$cluster\"}, nodename)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "hide": 0,
            "multi": true,
            "includeAll": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage % by Node",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{cluster=\"$cluster\", mode=\"idle\", instance=~\"$node\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 70, "color": "yellow" },
                  { "value": 85, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Memory Usage % by Node",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "100 - (node_memory_MemAvailable_bytes{cluster=\"$cluster\", instance=~\"$node\"} / node_memory_MemTotal_bytes{cluster=\"$cluster\", instance=~\"$node\"} * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 70, "color": "yellow" },
                  { "value": 85, "color": "red" }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{cluster=\"$cluster\", phase=\"Running\"})",
              "legendFormat": "Running Pods",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "id": 4,
          "title": "Network Receive by Node",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 8, "w": 9, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{cluster=\"$cluster\", instance=~\"$node\", device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])",
              "legendFormat": "{{instance}} rx",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps" }
          }
        },
        {
          "id": 5,
          "title": "Network Transmit by Node",
          "type": "timeseries",
          "gridPos": { "x": 15, "y": 8, "w": 9, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "rate(node_network_transmit_bytes_total{cluster=\"$cluster\", instance=~\"$node\", device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])",
              "legendFormat": "{{instance}} tx",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps" }
          }
        }
      ],
      "schemaVersion": 38
    }
