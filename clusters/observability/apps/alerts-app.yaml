apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerts
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/baona1109/gitops-observability
    targetRevision: main
    path: clusters/observability/apps/alerts
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
