apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-agent
  namespace: argocd
spec:
  project: default
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.0.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            remoteWrite:
              - url: http://prometheus.sudocrew.io.vn/api/v1/write
                writeRelabelConfigs:
                  - targetLabel: cluster
                    replacement: prod
        grafana:
          enabled: false
        alertmanager:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
