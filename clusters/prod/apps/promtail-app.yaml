apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  destination:
    namespace: observability
    server: https://kubernetes.default.svc
  source:
    chart: promtail
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.15.3
    helm:
      values: |
        config:
          clients:
            - url: https://loki.sudocrew.io.vn/loki/api/v1/push
          snippets:
            extraRelabelConfigs:
              - target_label: cluster
                replacement: prod
  ignoreDifferences:
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /automountServiceAccountToken
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
